name: Discord Wins

on:
  pull_request:
    types: [closed]

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WINS_WEBHOOK }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"PR merged!\",\"description\":\"**${{ github.event.pull_request.user.login }}** merged [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }}) v \`${{ github.event.repository.name }}\`\",\"color\":5224079,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            "$WEBHOOK_URL"
